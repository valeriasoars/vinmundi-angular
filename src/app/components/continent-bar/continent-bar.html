<section class="continents">
  @for (continent of continents; track continent.name) {
    <button class="continent-card" (click)="selecionarContinente(continent.id)">
      <h3>{{ continent.name }}</h3>

      <div class="continent-info">
        <i class="fa-solid fa-location-dot"></i>

        <span> {{ continent.countriesCount }} países </span>
      </div>
    </button>
  }
</section>
